<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguritisystem - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dise.css') }}">
</head>
<body>

<div class="top-bar">
    <div class="top-bar-icon">🔒</div>
    <div>
        <h1>Ingeniería en Telemática</h1>
        <h2>Seguritisystem</h2>
    </div>
</div>

<div class="main-content">
    <div class="login-card">
        <div class="card-header">
            <div class="card-icon">👤</div>
            <h3>Iniciar Sesión</h3>
            <p>Acceso al sistema de seguridad</p>
        </div>
        <form method="POST" action="/login">
            <label class="field-label">Usuario</label>
            <div class="field-wrap">
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            <label class="field-label">Contraseña</label>
            <div class="field-wrap">
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
    </div>
</div>

<div class="bottom-bar">
    <span>Mauricio Blando</span>
    <span>Walter Jara</span>
</div>

</body>
</html>
